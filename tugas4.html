<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>

    <title>Tugas 4 Todo List pro</title>
</head>

<body class="bg-gray-100">

    <div class="max-w-md mx-auto mt-10 p-6 bg-white rounded-lg shadow-xl">

        <h1 class="text-2xl font-bold mb-4 text-center">
            My Tasks
        </h1>

        <div class="flex gap-2 mb-2">

            <input
                type="text"
                id="todo-input"
                class="flex-1 border border-gray-300 rounded px-4 py-2"
                placeholder="Tambah tugas baru..."
            />

            <button
                id="add-btn"
                class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">

                Add
            </button>

        </div>

        <p id="error-text" class="text-red-500 text-sm mb-4 hidden">
            Input tidak boleh kosong
        </p>

        <div class="flex gap-2 mb-6">

            <button
                id="all-btn"
                class="bg-gray-300 px-3 py-1 rounded hover:bg-gray-400">
                All
            </button>

            <button
                id="active-btn"
                class="bg-gray-300 px-3 py-1 rounded hover:bg-gray-400">
                Active
            </button>

            <button
                id="completed-btn"
                class="bg-gray-300 px-3 py-1 rounded hover:bg-gray-400">
                Completed
            </button>

        </div>

        <ul id="todo-list" class="space-y-3"></ul>

    </div>

    <script src="script.js"></script>

</body>
</html>
